{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='Finanpy - Sistema de gestão financeira pessoal'>
    <title>{% block title %}Finanpy{% endblock %}</title>

    {# Inline SVG favicon so the browser doesn't hit a 404 for /favicon.ico. #}
    <link rel='icon' type='image/svg+xml' href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%237c3aed'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-size='20' font-weight='800' fill='white'>F</text></svg>">

    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>

    {% tailwind_css %}
</head>
<body class='bg-slate-900 text-slate-100 font-sans antialiased min-h-screen'>

    {% if messages %}
        <div class='fixed top-4 right-4 z-50 space-y-2 w-full max-w-sm'>
            {% for message in messages %}
                <div role='alert'
                     class='flex items-start justify-between px-4 py-3 rounded-lg shadow-lg border text-sm
                            {% if message.tags == 'success' %}bg-emerald-500/10 border-emerald-500/30 text-emerald-300
                            {% elif message.tags == 'error' %}bg-rose-500/10 border-rose-500/30 text-rose-300
                            {% elif message.tags == 'warning' %}bg-amber-500/10 border-amber-500/30 text-amber-300
                            {% else %}bg-indigo-500/10 border-indigo-500/30 text-indigo-300{% endif %}'>
                    <span class='flex-1'>{{ message }}</span>
                    <button type='button'
                            onclick='this.parentElement.remove()'
                            class='ml-3 text-current opacity-70 hover:opacity-100 transition-opacity'
                            aria-label='Fechar'>
                        &times;
                    </button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main class='min-h-screen'>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
